version: 1
backend:
  phases:
    build:
      commands:
        - npm install
        - npm install aws-cdk-lib constructs @aws-amplify/backend @aws-sdk/client-bedrock-runtime
        - npm install -g @aws-amplify/backend-cli --force
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*